<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-RES | Authority Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 900: '#0f172a', 800: '#1e293b', 700: '#334155' },
                        critical: '#ef4444',
                        high: '#f97316',
                        medium: '#eab308',
                        low: '#22c55e'
                    }
                }
            }
        };
    </script>
</head>
<body class="min-h-screen bg-dark-900 text-slate-100">
    <header class="sticky top-0 z-10 border-b border-dark-700 bg-dark-900/95 backdrop-blur p-4">
        <div class="max-w-6xl mx-auto flex items-center justify-between gap-4">
            <div>
                <h1 class="text-xl font-black tracking-wide">A-RES AUTHORITY TERMINAL</h1>
                <p class="text-xs text-slate-400 mt-1">Prioritized emergency feed received from the central coordination laptop</p>
            </div>
            <div class="text-right">
                <div class="inline-flex items-center gap-2 rounded-full border border-low/30 bg-low/10 px-3 py-1 text-xs text-low">
                    <span class="w-2 h-2 rounded-full bg-low animate-pulse"></span>
                    LIVE
                </div>
                <div id="last-refresh" class="text-[10px] text-slate-500 mt-1">Waiting for data...</div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4">
        <section class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-4">
            <div class="rounded-lg border border-dark-700 bg-dark-800 p-4">
                <div class="text-xs text-slate-400 uppercase">Tracked Buildings</div>
                <div id="stat-total" class="text-3xl font-black mt-1">0</div>
            </div>
            <div class="rounded-lg border border-critical/30 bg-critical/10 p-4">
                <div class="text-xs text-red-300 uppercase">Critical</div>
                <div id="stat-critical" class="text-3xl font-black mt-1 text-critical">0</div>
            </div>
            <div class="rounded-lg border border-high/30 bg-high/10 p-4">
                <div class="text-xs text-orange-300 uppercase">High</div>
                <div id="stat-high" class="text-3xl font-black mt-1 text-high">0</div>
            </div>
            <div class="rounded-lg border border-indigo-500/30 bg-indigo-500/10 p-4">
                <div class="text-xs text-indigo-300 uppercase">Occupants</div>
                <div id="stat-occupancy" class="text-3xl font-black mt-1">0</div>
            </div>
        </section>

        <section id="alert-list" class="space-y-3">
            <div class="rounded-lg border border-dark-700 bg-dark-800 p-4 text-sm text-slate-400">Waiting for central coordination feed...</div>
        </section>
    </main>

    <script>
        const priorityClass = {
            CRITICAL: 'border-critical bg-critical/10 text-critical',
            HIGH: 'border-high bg-high/10 text-high',
            MEDIUM: 'border-medium bg-medium/10 text-medium',
            LOW: 'border-dark-700 bg-dark-800 text-low'
        };

        function pct(value) {
            return `${Math.round(Math.max(0, Math.min(1, Number(value || 0))) * 100)}%`;
        }

        function renderAlert(alert) {
            const klass = priorityClass[alert.priority] || priorityClass.LOW;
            const breakdown = alert.score_breakdown || {};
            const hazards = [
                alert.smoke_detected ? 'Smoke' : null,
                alert.gas_detected ? 'Gas' : null
            ].filter(Boolean).join(', ') || 'None';

            return `
                <article class="rounded-lg border ${klass} p-4">
                    <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-3">
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="rounded px-2 py-1 border border-current text-xs font-black">${alert.priority}</span>
                                <h2 class="text-lg font-black text-slate-100">${alert.building_id}</h2>
                                <span class="text-xs text-slate-400">${alert.type || 'Building'}</span>
                            </div>
                            <div class="mt-2 grid grid-cols-2 md:grid-cols-4 gap-2 text-xs text-slate-300">
                                <div>Occupancy: <strong>${alert.occupancy}</strong></div>
                                <div>Vulnerability: <strong>${pct(alert.vulnerability)}</strong></div>
                                <div>Hazards: <strong>${hazards}</strong></div>
                                <div>Edge Alarm: <strong>${alert.local_alarm_level}</strong></div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-4xl font-black">${alert.urgency_score}</div>
                            <div class="text-[10px] text-slate-400 uppercase">Urgency Score</div>
                        </div>
                    </div>

                    <div class="mt-4 grid grid-cols-1 md:grid-cols-3 gap-3 text-xs">
                        <div class="rounded border border-white/10 bg-dark-900/50 p-3">
                            <div class="text-slate-500 uppercase mb-1">Assigned Unit</div>
                            <div class="font-bold text-slate-100">${alert.authority_unit}</div>
                        </div>
                        <div class="rounded border border-white/10 bg-dark-900/50 p-3">
                            <div class="text-slate-500 uppercase mb-1">Recommended Action</div>
                            <div class="font-bold text-slate-100">${alert.recommended_action}</div>
                        </div>
                        <div class="rounded border border-white/10 bg-dark-900/50 p-3">
                            <div class="text-slate-500 uppercase mb-1">Score Factors</div>
                            <div class="text-slate-100">Occ ${Math.round(breakdown.occupancy || 0)} · Haz ${Math.round(breakdown.hazards || 0)} · Vuln ${Math.round(breakdown.vulnerability || 0)}</div>
                        </div>
                    </div>
                </article>
            `;
        }

        async function refresh() {
            try {
                const response = await fetch('/authority/alerts');
                const alerts = await response.json();
                document.getElementById('stat-total').innerText = alerts.length;
                document.getElementById('stat-critical').innerText = alerts.filter(a => a.priority === 'CRITICAL').length;
                document.getElementById('stat-high').innerText = alerts.filter(a => a.priority === 'HIGH').length;
                document.getElementById('stat-occupancy').innerText = alerts.reduce((sum, a) => sum + (a.occupancy || 0), 0);
                document.getElementById('alert-list').innerHTML = alerts.length
                    ? alerts.map(renderAlert).join('')
                    : '<div class="rounded-lg border border-dark-700 bg-dark-800 p-4 text-sm text-slate-400">No active alerts yet.</div>';
                document.getElementById('last-refresh').innerText = `Last refresh: ${new Date().toLocaleTimeString()}`;
            } catch (error) {
                document.getElementById('alert-list').innerHTML = '<div class="rounded-lg border border-critical/40 bg-critical/10 p-4 text-sm text-critical">Central feed is not reachable.</div>';
            }
        }

        refresh();
        setInterval(refresh, 2000);
    </script>
</body>
</html>
