<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A-RES Mobile Triage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .priority-CRITICAL { border-left: 4px solid #ef4444; }
        .priority-HIGH { border-left: 4px solid #f97316; }
        .priority-MEDIUM { border-left: 4px solid #eab308; }
        .priority-LOW { border-left: 4px solid #3b82f6; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Header -->
    <header class="p-4 bg-slate-900 border-b border-slate-800 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center font-bold">A</div>
            <div>
                <h1 class="text-sm font-bold tracking-wider">A-RES <span class="font-light text-slate-400">MOBILE</span></h1>
                <div class="text-[10px] text-green-400 flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span> SYSTEM ACTIVE</div>
            </div>
        </div>
        <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center">
            <svg class="w-5 h-5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-4 space-y-4" id="building-list">
        <div class="text-center text-slate-500 py-10 text-sm">Connecting to Command Center...</div>
    </main>

    <!-- Bottom Nav -->
    <nav class="bg-slate-900 border-t border-slate-800 p-4 flex justify-around sticky bottom-0">
        <button class="flex flex-col items-center text-blue-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            <span class="text-[10px] mt-1 font-medium">Triage</span>
        </button>
        <button class="flex flex-col items-center text-slate-500 hover:text-slate-300">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            <span class="text-[10px] mt-1 font-medium">Map</span>
        </button>
        <button class="flex flex-col items-center text-slate-500 hover:text-slate-300">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
            <span class="text-[10px] mt-1 font-medium">Camera</span>
        </button>
    </nav>

    <script>
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        // Connect to the backend
        const socket = new WebSocket(`${wsProtocol}//${window.location.hostname}:8000/ws/dashboard`);
        
        socket.onmessage = function(event) {
            const buildings = JSON.parse(event.data);
            updateMobileUI(buildings);
        };

        function updateMobileUI(buildings) {
            const list = document.getElementById('building-list');
            list.innerHTML = '';
            
            // Sort by Urgency Score
            buildings.sort((a, b) => b.urgency_score - a.urgency_score);

            buildings.forEach(b => {
                const priorityColor = b.priority === 'CRITICAL' ? 'text-red-500' : 
                                      b.priority === 'HIGH' ? 'text-orange-500' : 
                                      b.priority === 'MEDIUM' ? 'text-yellow-500' : 'text-blue-500';

                const card = `
                    <div class="glass-card rounded-xl p-4 priority-${b.priority} shadow-lg active:scale-95 transition-transform">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h3 class="font-bold text-lg text-slate-100">${b.building_id}</h3>
                                <p class="text-xs text-slate-400 capitalize">${b.type}</p>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-black ${priorityColor}">${b.urgency_score}</div>
                                <div class="text-[10px] text-slate-500 uppercase tracking-wide">AI Score</div>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mb-3">
                            <div class="bg-slate-800/50 rounded-lg p-2 flex items-center justify-between">
                                <span class="text-xs text-slate-400">People</span>
                                <span class="font-bold text-sm">${b.occupancy}</span>
                            </div>
                            <div class="bg-slate-800/50 rounded-lg p-2 flex items-center justify-between">
                                <span class="text-xs text-slate-400">PGA</span>
                                <span class="font-bold text-sm text-red-400">${b.pga.toFixed(3)}g</span>
                            </div>
                        </div>
                        ${(b.smoke_detected || b.gas_detected) ? `
                            <div class="bg-red-500/20 border border-red-500/50 rounded-lg p-2 flex items-center gap-2 mb-3">
                                <svg class="w-4 h-4 text-red-500 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                                <span class="text-xs font-bold text-red-400">${b.smoke_detected ? 'FIRE ALARM ' : ''}${b.gas_detected ? 'GAS LEAK' : ''}</span>
                            </div>
                        ` : ''}
                        <button class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold py-2 rounded-lg transition-colors">
                            Dispatch Rescue Team
                        </button>
                    </div>
                `;
                list.innerHTML += card;
            });
        }
    </script>
</body>
</html>
